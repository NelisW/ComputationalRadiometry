name: comrad
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.12
  # Notebook runtime
  - jupyter>=1.0
  - notebook>=7.0
  - ipykernel>=6.0
  - ipython>=8.0
  - ipywidgets>=8.0
  # Numerical / scientific
  - numpy>=1.26
  - scipy>=1.12
  - sympy>=1.12
  # Data / tabular
  - pandas>=2.0
  - openpyxl>=3.1          # Excel I/O used in several notebooks
  # Plotting
  - matplotlib>=3.8
  - seaborn>=0.13
  # Image processing
  - scikit-image>=0.22
  - pillow>=10.0
  - imageio>=2.33
  # Notebook utilities
  - nbformat>=5.9
  - markdown>=3.5
  - scikit-learn>=1.3       # ryprob — KernelDensity, GridSearchCV, LeaveOneOut
  - pytest>=7.0             #  regression suite
  - pip                     # required to install pip-only packages below
  - pip:
      - transformations>=2023.0  # ryscene — 3-D homogeneous transforms (Gohlke wheel)

  # Local package — install separately after activating this environment:
  #   pip install -e <path-to-pyradi>
