name: comrad

# channel_priority: strict ensures every package resolves from the SAME
# channel build.  Without it, conda can mix conda-forge and defaults builds
# of HDF5, producing incompatible DLLs on Windows ("DLL not found").
# conda-forge must be listed first.
channels:
  - conda-forge
  - defaults

dependencies:
  - python>=3.12
  # Notebook runtime
  - jupyter>=1.1
  - notebook>=7.4
  - ipykernel>=6.29
  - ipython>=8.27            # IPython -- VersionInformation class, update_progress
  - ipywidgets>=8.1
  # Numerical / scientific
  # numpy 2.x required: h5py 3.11+ dropped numpy 1.x ABI; StringDType needs 2.x
  - numpy>=2.2
  - scipy>=1.14              # 1.14+ supports numpy 2.x ABI
  - sympy>=1.13
  # Data / tabular
  - pandas>=2.2              # 2.2+ supports numpy 2.x
  - openpyxl>=3.1            # Excel I/O used in several notebooks
  # Plotting
  - matplotlib>=3.9          # 3.9+ supports numpy 2.x
  - seaborn>=0.13
  # Image processing
  - scikit-image>=0.23       # 0.23+ supports numpy 2.x
  - pillow>=10.0             # PIL -- image I/O in drawCheckerboard / extractGraph
  - imageio>=2.35            # ryfiles -- rawFrameToImageFile
  # Notebook utilities
  - nbformat>=5.10
  - markdown>=3.6
  # other
  - scikit-learn>=1.4        # ryprob -- KernelDensity, GridSearchCV, LeaveOneOut
  - pytest>=8.0              # test/ regression suite
  # HDF5
  # Install h5py from conda-forge (NOT pip).  conda-forge's h5py build bundles
  # its own libhdf5 DLL, avoiding the "DLL not found" error on Windows.
  # h5py 3.14+ adds native NumPy StringDType support (more efficient than the
  # object-based string handling used in numpy 1.x).
  # Known-good pairing in Anaconda base: h5py=3.15.1 + numpy=2.3.5 + hdf5=1.14.5
  #
  # If conda-forge cannot resolve a compatible h5py for your Python version,
  # fall back to the pip source-build approach:
  #   conda install hdf5        (provides the C library + headers)
  #   pip install --no-binary h5py h5py
  # This compiles h5py against the exact numpy and hdf5 already in the env,
  # guaranteeing ABI compatibility.  Requires MSVC (included with Anaconda).
  - h5py>=3.14
  - pip                        # required to install pip-only packages below
  - pip:
      - transformations>=2023.0  # ryscene -- 3-D homogeneous transforms (Gohlke wheel)

  # Local package -- install separately after activating this environment:
  #   pip install -e <path-to-pyradi>
